name: Pull Request

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build and Test
    uses: ./.github/workflows/build.yml
    with:
      dotnet-version: '10.0.x'
      configuration: 'Release'

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/OpenRouterMcp/OpenRouterMcp.csproj

      - name: Format check
        run: dotnet format src/OpenRouterMcp/OpenRouterMcp.csproj --verify-no-changes --verbosity diagnostic

      - name: Analyze
        run: dotnet build src/OpenRouterMcp/OpenRouterMcp.csproj --configuration Release /p:TreatWarningsAsErrors=true
