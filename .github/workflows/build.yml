name: Build

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: '.NET SDK version'
        required: false
        type: string
        default: '10.0.x'
      configuration:
        description: 'Build configuration'
        required: false
        type: string
        default: 'Release'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.0.0
        with:
          versionSpec: '6.0.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.0.0
        with:
          useConfigFile: true

      - name: Display GitVersion outputs
        run: |
          echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
          echo "NuGetVersion: ${{ steps.gitversion.outputs.nuGetVersion }}"

      - name: Restore dependencies
        run: dotnet restore src/OpenRouterMcp/OpenRouterMcp.csproj

      - name: Build
        run: dotnet build src/OpenRouterMcp/OpenRouterMcp.csproj --configuration ${{ inputs.configuration }} --no-restore

      - name: Pack
        run: dotnet pack src/OpenRouterMcp/OpenRouterMcp.csproj --configuration ${{ inputs.configuration }} --no-build --output ./packages /p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: openrouter-mcp-package-${{ steps.gitversion.outputs.nuGetVersion }}
          path: ./packages/*.nupkg
          retention-days: 7
